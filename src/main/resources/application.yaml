server:
  port: 9000

spring:
  application:
    name: card
  profiles:
    active: "prod"
  config:
    import: "optional:configserver:http://localhost:8071/"
  datasource:
    url: jdbc:mysql://localhost:3308/carddb
    username: root
    password: system@123
  jpa:
    show-sql: true
  sql:
    init:
      mode: ALWAYS

management:
  endpoints:
    web:
      exposure:
        include: "*"

